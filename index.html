    function generateCards() {
        const container = document.getElementById('cardsContainer');
        if (!container) return;
        container.innerHTML = '';
        
        sitesData.forEach((item, idx) => {
            const card = document.createElement('article');
            card.className = 'resource-card';
            card.id = `card-${idx}`;
            card.setAttribute('aria-label', `網站卡片：${item.title}`);
            
            const featuresHtml = item.features.map(f => `<li>${escapeHtml(f)}</li>`).join('');
            
            card.innerHTML = `
                <div class="card-content">
                    <div class="card-icon">${item.icon || '🔖'}</div>
                    <div class="badge-category">${escapeHtml(item.category)}</div>
                    <div class="site-title">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer">
                            ${escapeHtml(item.title)}
                        </a>
                    </div>
                    <div class="description">${escapeHtml(item.description)}</div>
                    <ul class="feature-list">${featuresHtml}</ul>
                    <div class="card-footer">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="visit-link">
                            前往探索 <span>→</span>
                        </a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    function generateQuickLinks() {
        const container = document.getElementById('quickLinksContainer');
        if (!container) return;
        container.innerHTML = '';
        
        sitesData.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.textContent = item.title;
            btn.className = 'quick-link-btn';
            btn.setAttribute('data-target-idx', idx);
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const targetCard = document.getElementById(`card-${idx}`);
                if (targetCard) {
                    targetCard.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start',
                    });
                    targetCard.style.transition = 'box-shadow 0.2s';
                    targetCard.style.boxShadow = '0 0 0 3px #2b8fae';
                    setTimeout(() => {
                        targetCard.style.boxShadow = '';
                    }, 1000);
                }
            });
            container.appendChild(btn);
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function initBackToTop() {
        const backBtn = document.getElementById('backToTopBtn');
        if (!backBtn) return;
        backBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        generateCards();
        generateQuickLinks();
        initBackToTop();
    });
